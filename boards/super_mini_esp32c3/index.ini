[env:super_mini_esp32c3]
platform = platformio/espressif32@^6.13.0
board = super_mini_esp32c3-custom
board_build.partitions = esp32c3_4mb.csv
lib_deps = 
  ${env.lib_deps}
build_unflags =
  ${env.build_unflags}
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=5
  -Iboards/super_mini_esp32c3
board_build.variants_dir = boards/variants

