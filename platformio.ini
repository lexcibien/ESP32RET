[platformio]
name = Firmware para Test Rede CAN (Arduino Leonardo)
description = Firmware para o câmbio com Arduino Leonardo, lê 4 entradas do câmbio e apresenta 6 botões virtuais ao PC como gamepad.
default_envs =
  super_mini_esp32c3
build_cache_dir = .pio/buildcache
boards_dir = boards/json
cache_dir = .pio/cache
platforms_dir = .pio/platforms
packages_dir = .pio/packages

extra_configs =
	boards/*.ini
	boards/*/*.ini

[env]
framework = arduino
build_type = release
lib_deps = 
  fastled/FastLED @ ^3.10.3
  https://github.com/collin80/can_common#8585f9d
	https://github.com/collin80/esp32_can#6d835ae
	https://github.com/collin80/esp32_mcp2517fd#1562422
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
check_tool = cppcheck, clangtidy
check_skip_packages = yes

[env:stable]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
framework = arduino
lib_extra_dirs = ~/Arduino/libraries

;for ESP32 boards (4MB flash)
board = esp32dev
board_build.partitions = minspiff.csv
;enable max debugging 
build_flags = -DCORE_DEBUG_LEVEL=5


[env:stable-s3]
;this one is probably fine to attempt to keep up to date.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.34/platform-espressif32.zip
framework = arduino
lib_extra_dirs = ~/Arduino/libraries

;for ESP32-S3 boards (8MB flash)
board_build.partitions = app_s3.csv
board = esp32-s3-devkitc-1
;enable max debugging and set so that Serial is the USB port and automatically started on boot
build_flags = -DCORE_DEBUG_LEVEL=5 -D ARDUINO_USB_MODE=1 -D ARDUINO_USB_CDC_ON_BOOT=1